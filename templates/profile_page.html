{% extends "base.html" %}
{% block content %}
<div class="top-bar-content">
    <div class="name-text">LockCloud</div>
    <div class="buttons">
        <a href="/set-lang/{{ 'ua' if current_lang == 'en' else 'en' }}" class="btn-language">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            {{ current_lang | upper }}
        </a>
        <a href="/storage" class="btn-home">{{ t('storage_title') }}</a>
    </div>
</div>

<div class="profile-layout">
    <aside class="profile-sidebar">
        <div class="sidebar-user">
            <div class="sidebar-avatar">
                <i class="fa-regular fa-user"></i>
            </div>
            <span>{{ user.full_name }}</span>
        </div>
        <div class="sidebar-line"></div>
        <nav class="sidebar-nav">
            <a href="/profile" class="active">
                <i class="fa-regular fa-user"></i> {{ t('nav_profile') }}
            </a>
            <a href="/settings">
                <i class="fa-solid fa-gear"></i> {{ t('nav_settings') }}
            </a>
            <a href="{{ url_for('logout') }}" class="signout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> {{ t('nav_sign_out') }}
            </a>
        </nav>
    </aside>

    <section class="profile-card">
        <h1>{{ t('nav_profile') }}</h1>
        <div class="profile-fields-grid">
            <div class="profile-field">
                <label>{{ t('admin_name') }}</label>
                <input type="text" value="{{ user.full_name.split(' ')[0] }}" disabled>
            </div>
            <div class="profile-field">
                <label>{{ t('admin_surname') }}</label>
                <input type="text"
                       value="{{ user.full_name.split(' ')[1] if user.full_name.split(' ')|length > 1 else '' }}"
                       disabled>
            </div>
            <div class="profile-field profile-field-full">
                <label>{{ t('profile_email') }}</label>
                <input type="email" value="{{ user.email }}" disabled>
            </div>
            <div class="profile-field profile-field-full">
                <label>{{ t('profile_phone') }}</label>
                <input type="text"
                       value="{{ user.phone if user.phone else '' }}"
                       placeholder="{{ t('profile_add_phone') }}"
                       disabled>
            </div>
        </div>
    </section>
</div>
{% endblock %}
