{% extends "base.html" %}
{% block content %}
<div class="top-bar-content">
    <div class="name-text">{{ session.user_name }}</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="{{ t('storage_search') }}">
    </div>
    <div class="top-icons">
        <a href="/set-lang/{{ 'ua' if current_lang == 'en' else 'en' }}" class="btn-language">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            {{ current_lang | upper }}
        </a>
        <a href="/profile" class="profile-icon-btn">
            <i class="fa-regular fa-user"></i>
        </a>
    </div>
</div>

<div class="storage-layout">
    <aside class="storage-sidebar">
        <nav class="storage-nav">
            <a href="/storage">
                <i class="fa-regular fa-folder"></i> {{ t('nav_my_drive') }}
            </a>
            <a href="/shared" class="active">
                <i class="fa-solid fa-share-nodes"></i> {{ t('nav_shared') }}
            </a>
            <a href="/trash">
                <i class="fa-regular fa-trash-can"></i> {{ t('nav_trash') }}
            </a>
        </nav>
    </aside>

    <section class="storage-content">
        <h1>{{ t('shared_title') }}</h1>
        <div class="file-list">
            {% for file in files %}
            <div class="file-row">
                <a href="/storage/file/{{ file.id }}">
                    <i class="fa-regular fa-file"></i>
                    <span>{{ file.filename }}</span>
                </a>
            </div>
            {% endfor %}
        </div>
    </section>
</div>
{% endblock %}
