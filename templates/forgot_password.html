{% extends "base.html" %}
{% block content %}
<div class="top-bar-content">
    <div class="name-text">LockCloud</div>
    <div class="buttons">
        <a href="/set-lang/{{ 'ua' if current_lang == 'en' else 'en' }}" class="btn-language">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            {{ current_lang | upper }}
        </a>
        <a href="{{ url_for('home') }}" class="btn-home">{{ t('nav_home') }}</a>
    </div>
</div>

<section class="forgot-password">
    <div class="forgot-password-form">
        <h1>{{ t('forgot_title') }}</h1>
        <p>{{ t('forgot_desc') }}</p>
        <form method="POST">
            <label>{{ t('signup_email') }}</label>
            <input type="email" name="email" placeholder="{{ t('signin_email') }}" required>
            <button type="submit" class="forgot-btn">
                {{ t('forgot_btn') }}
            </button>
        </form>
        <a href="{{ url_for('signin') }}" class="back-to-login">
            ← {{ t('back_to_signin') }}
        </a>
    </div>
</section>
{% endblock %}
