{% extends "base.html" %}

{% block content %}

<div class="top-bar-content">
    <div class="name-text">NAME</div>
    <div class="buttons">
        <a href="/storage" class="btn-home">Storage</a>
    </div>
</div>

<div class="profile-layout">

    <aside class="profile-sidebar">
        <div class="sidebar-user">
            <i class="fa-regular fa-user"></i>
            <span>{{ user.full_name }}</span>
        </div>

        <div class="sidebar-line"></div>

        <nav class="sidebar-nav">
            <a href="/profile">Profile</a>
            <a href="/settings" class="active">Settings</a>
            <a href="{{ url_for('logout') }}" class="signout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out
            </a>
        </nav>
    </aside>

    <section class="settings-content">
        <h1>Settings</h1>

        <!-- 🔐 PASSWORD -->
        <h2>Security</h2>

        <form method="POST" action="/settings/change-password" class="settings-grid">

            <div class="settings-field">
                <label>Current password</label>
                <input type="password" name="current_password" required>
            </div>

            <div class="settings-field">
                <label>New password</label>
                <input type="password" name="new_password" required>
            </div>

            <div class="settings-field settings-field-full">
                <label>Confirm new password</label>
                <input type="password" name="confirm_password" required>
            </div>

            <div class="settings-field settings-field-full">
                <button type="submit" class="settings-btn">
                    Change Password
                </button>
            </div>

        </form>

        <!-- 📧 EMAIL -->
        <h2>Account</h2>

        <form method="POST" action="/settings/change-email" class="settings-grid">

            <div class="settings-field settings-field-full">
                <label>New email</label>
                <input type="email" name="new_email" required>
            </div>

            <div class="settings-field settings-field-full">
                <button type="submit" class="settings-btn">
                    Change Email
                </button>
            </div>

        </form>

    </section>

</div>

{% endblock %}
