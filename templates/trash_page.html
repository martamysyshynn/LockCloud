{% extends "base.html" %}

{% block content %}

<div class="top-bar-content">
    <div class="name-text">{{ session.user_name }}</div>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search in trash...">
    </div>

    <div class="top-icons">
        <a href="/profile">
            <i class="fa-regular fa-user"></i>
        </a>
    </div>
</div>

<div class="storage-layout">

<aside class="storage-sidebar">
    <nav class="storage-nav">
        <a href="/storage" class="active">
            <i class="fa-regular fa-folder"></i>
            My Drive
        </a>
        <a href="/shared">
            <i class="fa-solid fa-share-nodes"></i>
            Shared
        </a>
        <a href="/trash">
            <i class="fa-regular fa-trash-can"></i>
            Trash
        </a>
    </nav>
</aside>

<section class="storage-content">
<h1>Trash</h1>

<div class="file-list">

{% for folder in folders %}
<div class="file-row">
    <div class="file-row-left">
        <i class="fa-regular fa-folder"></i>
        <span>{{ folder.name }}</span>
    </div>
    <div class="three-dot-wrapper">
        <button class="three-dot-btn" onclick="toggleMenu('menu-folder-{{ folder.id }}', event)">
            <i class="fa-solid fa-ellipsis"></i>
        </button>
        <div class="dot-menu" id="menu-folder-{{ folder.id }}">
            <form action="/restore-folder/{{ folder.id }}" method="POST" style="margin:0;">
                <button type="submit" class="dot-menu-item">
                    <i class="fa-solid fa-rotate-left"></i> Restore
                </button>
            </form>
            <div class="dot-divider"></div>
            <form action="/delete-folder-permanently/{{ folder.id }}" method="POST" style="margin:0;">
                <button type="submit" class="dot-menu-item danger">
                    <i class="fa-solid fa-xmark"></i> Delete permanently
                </button>
            </form>
        </div>
    </div>
</div>
{% endfor %}

{% for file in files %}
<div class="file-row">
    <div class="file-row-left">
        <i class="fa-regular fa-file"></i>
        <span>{{ file.filename }}</span>
    </div>
    <div class="three-dot-wrapper">
        <button class="three-dot-btn" onclick="toggleMenu('menu-file-{{ file.id }}', event)">
            <i class="fa-solid fa-ellipsis"></i>
        </button>
        <div class="dot-menu" id="menu-file-{{ file.id }}">
            <form action="/restore-file/{{ file.id }}" method="POST" style="margin:0;">
                <button type="submit" class="dot-menu-item">
                    <i class="fa-solid fa-rotate-left"></i> Restore
                </button>
            </form>
            <div class="dot-divider"></div>
            <form action="/delete-file-permanently/{{ file.id }}" method="POST" style="margin:0;">
                <button type="submit" class="dot-menu-item danger">
                    <i class="fa-solid fa-xmark"></i> Delete permanently
                </button>
            </form>
        </div>
    </div>
</div>
{% endfor %}

</div>
</section>
</div>


<script>
function toggleMenu(id, e) {
    e.stopPropagation();
    const menu = document.getElementById(id);
    const isOpen = menu.classList.contains('open');
    document.querySelectorAll('.dot-menu').forEach(m => m.classList.remove('open'));
    if (!isOpen) menu.classList.add('open');
}
document.addEventListener('click', function() {
    document.querySelectorAll('.dot-menu').forEach(m => m.classList.remove('open'));
});
</script>

{% endblock %}
