{% extends "base.html" %}

{% block content %}

<div class="top-bar-content">
    <div class="name-text">{{ session.user_name }}</div>

    <form method="GET" action="/storage" class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input 
            type="text" 
            name="search"
            placeholder="Search for files..."
            value="{{ request.args.get('search', '') }}"
        >
    </form>

    <div class="top-icons">
        <i class="fa-solid fa-globe"></i>
        <a href="/profile">
            <i class="fa-regular fa-user"></i>
        </a>
    </div>
</div>

<div class="storage-layout">

    <aside class="storage-sidebar">

        <input type="checkbox" id="create-toggle" hidden>

        <label for="create-toggle" class="create-btn">
            <i class="fa-solid fa-plus"></i>
            Create
        </label>

        <div class="create-panel">

           <form action="/storage/create-folder" method="POST" class="create-form">
            <input type="hidden" name="parent_id" value="{{ current_folder_id }}">
                <input
                    type="text"
                    name="folder_name"
                    placeholder="Folder name"
                    required
                >
                <button type="submit">
                    <i class="fa-solid fa-folder-plus"></i>
                    Create folder
                </button>
            </form>

            <form
                action="/storage/upload"
                method="POST"
                enctype="multipart/form-data"
                class="upload-form"
            >
                <input type="hidden" name="folder_id" value="{{ current_folder_id }}">
                <input type="file" name="file" required>
                <button type="submit">
                    <i class="fa-solid fa-upload"></i>
                    Upload file
                </button>
            </form>

            <label for="create-toggle" class="cancel-btn">
                Cancel
            </label>
        </div>

        <nav class="storage-nav">
            <a href="/storage" class="active">
                <i class="fa-regular fa-folder"></i>
                My Drive
            </a>
            <a href="/shared">
                <i class="fa-solid fa-share-nodes"></i>
                Shared
            </a>
            <a href="/trash">
                <i class="fa-regular fa-trash-can"></i>
                Trash
            </a>
        </nav>

    </aside>

    <section class="storage-content">
        <h1>My Drive</h1>

        <div class="file-list">

            {% for folder in folders %}
                <div class="file-row">
                    <a href="{{ url_for('storage', folder_id=folder.id) }}">
                        <i class="fa-regular fa-folder"></i>
                        <span>{{ folder.name }}</span>
                    </a>

                    <form 
                        action="/storage/delete-folder/{{ folder.id }}" 
                        method="POST"
                        class="delete-form"
                    >
                        <button type="submit" class="delete-btn">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </form>
                </div>
            {% endfor %}

            {% for file in files %}
            <div class="file-row">

                <a href="/storage/file/{{ file.id }}">
                    <i class="fa-regular fa-file"></i>
                    <span>{{ file.filename }}</span>
                </a>

                <div class="file-actions">
                    <a href="#share-{{ file.id }}" class="share-btn">
                        <i class="fa-solid fa-share-nodes"></i>
                    </a>

                    <form action="/delete-file-permanently/{{ file.id }}" method="POST">
                        <button class="delete-btn">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </form>
                </div>

            </div>

            <div id="share-{{ file.id }}" class="share-popup">
                <div class="share-box">
                    <h2>Share file</h2>
                    <p>{{ file.filename }}</p>

                    <form action="/storage/share-file/{{ file.id }}" method="POST">
                        <input type="email" name="email" placeholder="Enter user email" required>
                        <button type="submit">Share</button>
                    </form>

                    <a href="#" class="close-share">Cancel</a>
                </div>
            </div>

            {% endfor %}

        </div>

    </section>
</div>

{% endblock %}
